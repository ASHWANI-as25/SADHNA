<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </radialGradient>

    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#6b7280;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:0.5" />
    </linearGradient>

    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#800080;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B008B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>

    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Outer circle (silver/gray metallic) -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#circleGrad)" stroke-width="5" opacity="0.9"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#circleGrad)" stroke-width="8" opacity="0.3"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#circleGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Inner dark background -->
  <circle cx="200" cy="200" r="175" fill="#1a1a2e" opacity="0.6"/>

  <!-- Background brain network (top left) -->
  <g opacity="0.5">
    <!-- Main brain cluster -->
    <circle cx="160" cy="120" r="35" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <!-- Network nodes -->
    <circle cx="150" cy="105" r="3" fill="#d8b4fe"/>
    <circle cx="170" cy="105" r="3" fill="#d8b4fe"/>
    <circle cx="155" cy="135" r="3" fill="#d8b4fe"/>
    <circle cx="165" cy="135" r="3" fill="#d8b4fe"/>
    <circle cx="160" cy="115" r="2.5" fill="#e9d5ff"/>
    <!-- Connection lines -->
    <line x1="150" y1="105" x2="155" y2="135" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="170" y1="105" x2="165" y2="135" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="150" y1="105" x2="170" y2="105" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- MAIN FLAME (Center) -->
  <!-- Base of flame -->
  <ellipse cx="200" cy="210" rx="32" ry="28" fill="url(#flameGrad)" filter="url(#innerGlow)"/>
  
  <!-- Middle flame -->
  <path d="M 200 210 Q 180 180 185 140 Q 190 120 200 110 Q 210 120 215 140 Q 220 180 200 210" fill="url(#flameGrad)" filter="url(#innerGlow)"/>
  
  <!-- Top flame point -->
  <path d="M 200 110 Q 195 95 200 75 Q 205 95 200 110" fill="#FFD700" filter="url(#innerGlow)" opacity="0.9"/>
  
  <!-- Flame highlight -->
  <ellipse cx="200" cy="140" rx="18" ry="25" fill="#FFFF99" opacity="0.6"/>

  <!-- MEDITATION BODY/LOTUS (Below flame) -->
  <!-- Left leg -->
  <path d="M 188 235 Q 175 245 165 270" fill="none" stroke="url(#bodyGrad)" stroke-width="4" stroke-linecap="round" filter="url(#innerGlow)"/>
  
  <!-- Right leg -->
  <path d="M 212 235 Q 225 245 235 270" fill="none" stroke="url(#bodyGrad)" stroke-width="4" stroke-linecap="round" filter="url(#innerGlow)"/>
  
  <!-- Lotus petals (bottom) -->
  <circle cx="165" cy="275" r="2.5" fill="url(#bodyGrad)"/>
  <circle cx="235" cy="275" r="2.5" fill="url(#bodyGrad)"/>

  <!-- GROWTH ARROW (Right side - white arrow going up-right) -->
  <g filter="url(#outerGlow)">
    <!-- Arrow shaft -->
    <line x1="260" y1="220" x2="310" y2="160" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrow head triangle -->
    <polygon points="310,160 320,155 305,135" fill="white" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- CHART BARS (Right side - growth bars) -->
  <g filter="url(#innerGlow)">
    <!-- Bar 1 (smallest) -->
    <rect x="280" y="215" width="12" height="30" rx="2" fill="url(#chartGrad)" opacity="0.9"/>
    <!-- Bar 2 (medium) -->
    <rect x="300" y="200" width="12" height="45" rx="2" fill="url(#chartGrad)"/>
    <!-- Bar 3 (tallest) -->
    <rect x="320" y="185" width="12" height="60" rx="2" fill="url(#chartGrad)" opacity="0.8"/>
    <!-- Bar 4 (ascending) -->
    <rect x="340" y="195" width="12" height="50" rx="2" fill="url(#chartGrad)" opacity="0.7"/>
  </g>

  <!-- Decorative stars/sparkles -->
  <circle cx="120" cy="100" r="2" fill="#ff1493" opacity="0.6"/>
  <circle cx="280" cy="100" r="2" fill="#ff1493" opacity="0.6"/>
  <circle cx="110" cy="250" r="1.5" fill="#ff1493" opacity="0.5"/>
  <circle cx="310" cy="280" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="150" cy="300" r="1" fill="#ff1493" opacity="0.4"/>
  <circle cx="250" cy="310" r="1" fill="#ffd700" opacity="0.4"/>

  <!-- Inner circle accent -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#bodyGrad)" stroke-width="1" opacity="0.2"/>
</svg>